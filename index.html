<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExtremalMath | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #0366d6;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-light: #666666;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 700px;
            width: 90%;
            background: var(--card-bg);
            padding: 60px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            margin-top: 40px;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Lora', serif;
            font-size: 2.8em;
            margin-bottom: 10px;
            color: var(--primary-color);
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 1.1em;
            color: var(--text-light);
            margin-bottom: 40px;
            font-weight: 300;
        }

        .email-link {
            color: var(--accent-color);
            text-decoration: none;
            border-bottom: 1px dashed var(--accent-color);
            transition: all 0.3s ease;
        }

        .email-link:hover {
            border-bottom: 1px solid var(--accent-color);
            background-color: rgba(3, 102, 214, 0.1);
        }

        .nav-button {
            display: inline-block;
            margin: 30px 0;
            padding: 16px 40px;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1em;
            box-shadow: 0 4px 15px rgba(44, 62, 80, 0.3);
            transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
        }

        .nav-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(44, 62, 80, 0.4);
            background-color: #1a252f;
        }

        /* 次要按钮样式 */
        .nav-button-secondary {
            display: inline-block;
            margin: 0 10px;
            padding: 14px 36px;
            background-color: transparent;
            color: var(--primary-color);
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1em;
            border: 2px solid var(--primary-color);
            transition: all 0.2s ease;
        }

        .nav-button-secondary:hover {
            background-color: var(--primary-color);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(44, 62, 80, 0.3);
        }

        hr {
            border: 0;
            height: 1px;
            background: #eee;
            margin: 40px 0;
        }

        .footer {
            margin-top: 50px;
            font-size: 0.8em;
            color: #aaa;
        }

        @media (max-width: 600px) {
            .container { padding: 40px 20px; }
            h1 { font-size: 2.2em; }
            .nav-button, .nav-button-secondary { display: block; margin: 15px auto; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>ExtremalMath</h1>
            <p class="subtitle">Undergraduate Mathematics Student</p>
            <p style="font-size: 0.9em;">Contact: <a href="mailto:mymath2035@outlook.com" class="email-link">mymath2035@outlook.com</a></p>
        </header>

        <hr>

        <section>
            <p>Welcome to my digital space for mathematics and research.</p>
            <a href="about.html" class="nav-button">View Profile & Research</a>
            <a href="materials.html" class="nav-button-secondary">Browse Study Materials</a>
        </section>

        <div class="footer">
            &copy; 2026 ExtremalMath. Hosted on GitHub Pages.
        </div>
    </div>

</body>
</html>
