<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExtremalMath | Materials</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #0366d6;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #333333;
            --border-color: #eaeaea;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            width: 90%;
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
        }

        /* 左上角返回按钮样式 */
        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s;
        }
        
        .back-link:hover {
            color: var(--accent-color);
        }

        h1 {
            font-family: 'Lora', serif;
            font-size: 2.5em;
            margin-bottom: 2rem;
            color: var(--primary-color);
        }

        /* 导航卡片网格布局 */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .nav-card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 2rem;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .nav-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-color: var(--accent-color);
        }

        .nav-icon {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .nav-title {
            font-weight: 600;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <!-- 返回主页链接 -->
    <a href="index.html" class="back-link">← Back to Home</a>

    <div class="container">
        <h1>Study Materials</h1>
        <p style="color: #666;">Select a category to view resources.</p>

        <div class="nav-grid">
            <!-- 链接到作业页 -->
            <a href="homework.html" class="nav-card">
                <span class="nav-icon">📝</span>
                <span class="nav-title">Homework</span>
            </a>

            <!-- 链接到论文页 -->
            <a href="course-essay.html" class="nav-card">
                <span class="nav-icon">🎓</span>
                <span class="nav-title">Course Essay</span>
            </a>

            <!-- 链接到笔记页 -->
            <a href="notes.html" class="nav-card">
                <span class="nav-icon">📚</span>
                <span class="nav-title">Notes</span>
            </a>
        </div>
    </div>

</body>
</html>
