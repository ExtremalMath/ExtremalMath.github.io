<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExtremalMath | Homework</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #0366d6;
            --bg-color: #f8f9fa;
            --border-color: #eaeaea;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background: #fff;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        h1 {
            font-family: 'Lora', serif;
            color: var(--primary-color);
            margin-top: 0;
        }
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }
        .top-nav a {
            text-decoration: none;
            color: #666;
            font-size: 0.9rem;
        }
        .top-nav a:hover { color: var(--accent-color); }

        /* 新增的说明文字样式 */
        .note {
            font-family: 'Lora', serif;
            font-style: italic;
            color: #555;
            font-size: 0.95rem;
            margin-bottom: 2rem;
            padding: 1rem;
            background-color: #f8f9fa;
            border-left: 4px solid var(--accent-color);
            border-radius: 4px;
        }

        .file-item {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 0.8rem;
            overflow: hidden;
        }
        .file-header {
            display: flex;
            align-items: center;
            padding: 1rem;
            cursor: pointer;
            background: #fff;
        }
        .file-header:hover { background: #fafafa; }
        .file-header .icon { margin-right: 0.8rem; font-size: 1.3rem; }
        .file-header .name { flex-grow: 1; font-weight: 600; }
        .file-header .arrow { transition: transform 0.3s; color: #999; }

        .preview {
            display: none;
            border-top: 1px solid var(--border-color);
            padding: 1rem;
            background: #fafafa;
        }
        .preview iframe {
            width: 100%;
            height: 600px;
            border: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-nav">
            <a href="materials.html">← Back to Materials</a>
            <span style="font-weight: 600; color: var(--primary-color);">Graph Theory Homework</span>
        </div>

        <!-- 新增的说明文字 -->
        <div class="note">
            These exercises are selected from the book <em>Large networks and graph limits</em> by László Lovász. Unless otherwise specified, the proofs are provided by myself.
        </div>

        <div class="file-item">
            <div class="file-header" onclick="toggle(this)">
                <span class="icon">✏️</span>
                <span class="name">Exercise 0526</span>
                <span class="arrow">▼</span>
            </div>
            <div class="preview">
                <iframe data-src="./notes/GraphTheoryHomework/Exercise0526.pdf"></iframe>
            </div>
        </div>

        <div class="file-item">
            <div class="file-header" onclick="toggle(this)">
                <span class="icon">✏️</span>
                <span class="name">Proof of Inequality 0521</span>
                <span class="arrow">▼</span>
            </div>
            <div class="preview">
                <iframe data-src="./notes/GraphTheoryHomework/proofofinequation0521.pdf"></iframe>
            </div>
        </div>

        <!-- "Property 0532" 文件项已删除 -->

    </div>

    <script>
        function toggle(el) {
            const preview = el.nextElementSibling;
            const arrow = el.querySelector('.arrow');
            const iframe = preview.querySelector('iframe');

            if (preview.style.display === 'block') {
                preview.style.display = 'none';
                arrow.style.transform = 'rotate(0deg)';
            } else {
                preview.style.display = 'block';
                arrow.style.transform = 'rotate(180deg)';
                if (!iframe.src || iframe.src === window.location.href) {
                    iframe.src = iframe.getAttribute('data-src');
                }
            }
        }
    </script>
</body>
</html>
